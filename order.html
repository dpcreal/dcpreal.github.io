<script type="module">
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
  import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
  import { auth, db } from "./firebase-config.js";

  const form = document.getElementById('orderForm');
  const submitButton = document.getElementById('submitButton');
  const authNotice = document.getElementById('authNotice');
  const successMessage = document.getElementById('successMessage');
  const errorMessage = document.getElementById('errorMessage');
  const nameInput = document.getElementById('name');

  const FORMSUBMIT_ENDPOINT = 'https://formsubmit.co/595f97935bc2f953174f2be0d9c6793f';
  let currentUser = null;

  function hideMessages() {
    authNotice.style.display = 'none';
    successMessage.style.display = 'none';
    errorMessage.style.display = 'none';
  }

  function requireSignIn() {
    hideMessages();
    authNotice.innerHTML = 'Please sign in before placing an order. <a href="account.html?next=order" style="color:inherit;text-decoration:underline;">Go to account</a>';
    authNotice.style.display = 'block';
    submitButton.disabled = true;
    submitButton.style.opacity = '0.7';
  }

  function unlockForm() {
    authNotice.style.display = 'none';
    submitButton.disabled = false;
    submitButton.style.opacity = '1';
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (!user) {
      requireSignIn();
      return;
    }

    unlockForm();
    if (!nameInput.value && user.displayName) {
      nameInput.value = user.displayName;
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessages();

    if (!currentUser) {
      requireSignIn();
      return;
    }

    submitButton.disabled = true;
    submitButton.textContent = 'Submitting...';

    const createdAtIso = new Date().toISOString();

    const orderData = {
      customerName: nameInput.value.trim(),
      customerEmail: currentUser.email || '',
      dimensions: form.dimensions.value.trim(),
      details: form.details.value.trim(),
      status: 'submitted',
      progressLabel: 'Submitted',
      progressStep: 1,
      canCancel: true,
      cancellationReason: '',
      cancelledAt: null,
      adminNote: '',
      createdAt: serverTimestamp(),
      statusUpdatedAt: serverTimestamp(),
      userUid: currentUser.uid,
      statusHistory: [
        {
          status: 'submitted',
          label: 'Submitted',
          note: 'Order was received.',
          at: createdAtIso,
          by: 'customer'
        }
      ]
    };

    try {
      const docRef = await addDoc(collection(db, 'users', currentUser.uid, 'orders'), orderData);

      const emailFormData = new FormData();
      emailFormData.append('_subject', `New Woodpecker Inc Order Request (${docRef.id})`);
      emailFormData.append('_captcha', 'false');
      emailFormData.append('orderId', docRef.id);
      emailFormData.append('customerName', orderData.customerName);
      emailFormData.append('customerEmail', orderData.customerEmail);
      emailFormData.append('dimensions', orderData.dimensions);
      emailFormData.append('details', orderData.details);
      emailFormData.append('uid', orderData.userUid);
      emailFormData.append('status', orderData.status);

      await fetch(FORMSUBMIT_ENDPOINT, {
        method: 'POST',
        headers: { Accept: 'application/json' },
        body: emailFormData
      });

      successMessage.innerHTML = `Order submitted successfully. Your order ID is <strong>${docRef.id}</strong>. You can now view it in <a href="account.html#orders" style="color:inherit;text-decoration:underline;">My Orders</a>.`;
      successMessage.style.display = 'block';
      form.reset();
      if (currentUser.displayName) {
        nameInput.value = currentUser.displayName;
      }
    } catch (error) {
      console.error(error);
      errorMessage.textContent = error?.message || 'There was a problem submitting your order.';
      errorMessage.style.display = 'block';
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = 'Submit Order Request';
    }
  });
</script>
